name: Respaldo Firestore

# Respaldo automático diario (03:00 UTC ≈ 10:00 p. m. Colombia) + manual.
on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Instalar dependencias
        working-directory: scripts/backup
        run: npm install

      - name: Exportar Firestore a JSON
        working-directory: scripts/backup
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: npm run export

      - name: Commit del respaldo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backups/
          if git diff --staged --quiet; then
            echo "Sin cambios en el respaldo."
          else
            git commit -m "chore: respaldo automatico de Firestore"
            git push
          fi
